name: Auto Release

on:
  pull_request_target:
    types: [closed]
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Read version from Cargo.toml
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep -m1 '^version\s*=' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')"
          if [[ -z "${version}" ]]; then
            echo "Could not read version from Cargo.toml" >&2
            exit 1
          fi
          tag="v${version}"
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists — did you forget to bump Cargo.toml?" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Ensure release notes exist
        run: |
          test -f "release-notes/${{ steps.version.outputs.tag }}.md"

      - name: Create and push tag
        env:
          NEW_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"

  release:
    needs: tag
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
    secrets: inherit
